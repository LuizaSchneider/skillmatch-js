<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Skillmatch | Recrutamento & Carreira</title>
    <link rel="icon" href="./assets/img/favcon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body id="infoCandidato">
    <header class="header-bg">
      <div class="header container">
        <a href="./">
          <img src="./assets/img/logo.svg" alt="SkillMatch" />
        </a>
      </div>
    </header>

    <main class="introducao-bg">
      <div class="container-bg container">
        <h2>Seu Perfil</h2>
        <p>Preencha seus dados</p>
        <form action="">
          <p>Nome</p>
          <input type="text" name="nome" id="nome" />
          <p>Área de Atuação</p>
          <input type="text" name="atuacao" id="atuacao" />
          <p>Selecione suas Abilidades</p>
          <p><input type="checkbox" value="javascript" />JavaScript</p>
          <p>Meses de Experiencia</p>
          <input type="number" name="experiencia" id="experiencia" />
          <p><input type="submit" value="Analisar Compatibilidade" /></p>
        </form>
      </div>
    </main>

    <footer class="footer">
      <p>SkillMatch — projeto avaliativo, Módulo 01.</p>
    </footer>
  </body>
</html>
