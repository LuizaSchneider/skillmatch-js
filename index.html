<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Skillmatch | Recrutamento & Carreira</title>
    <link rel="icon" href="./assets/img/favcon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body id="infoCandidato">
    <header class="header-bg">
      <div class="header container">
        <a href="./">
          <img src="./assets/img/logo.svg" alt="SkillMatch" />
        </a>
      </div>
    </header>

    <main class="introducao-bg">
      <div class="container-bg container">
        <div class="titulo-container">
          <h2>Seu Perfil</h2>
          <p>Preencha seus dados</p>
        </div>
        <div class="formulario">
          <form action="./assets/script/dados.js">
            <p><label for="inome">Nome</label></p>
            <input type="text" name="nome" id="inome" />
            <p><label for="iatuacao">Área de Atuação</label></p>
            <input type="text" name="atuacao" id="iatuacao" />

            <div class="habilidades">
              <p>Selecione suas Habilidades</p>
              <div class="habilidades-botoes">
                <input type="button" value="HTML" />
                <input type="button" value="CSS" />
                <input type="button" value="JavaScript" />
                <input type="button" value="Lógica de Programação" />
                <input type="button" value="GitHub" />
                <input type="button" value="Kanban" />
                <input type="button" value="Arrays" />
                <input type="button" value="Objetos" />
                <input type="button" value="Funções" />
                <input type="button" value="Figma" />
              </div>
            </div>

            <p>Meses de Experiência</p>
            <input type="number" name="experiencia" id="experiencia" />
            <p><input type="submit" value="Analisar Compatibilidade" /></p>
          </form>
        </div>
      </div>
    </main>

    <footer class="footer-bg">
      <div class="footer">
        <p>SkillMatch — projeto avaliativo. Módulo 01.</p>
      </div>
    </footer>
  </body>
</html>
